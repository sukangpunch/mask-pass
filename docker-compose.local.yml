version: "3.8"

services:
  redis:
    image: redis:7.0
    container_name: mask-pass-redis-local
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data_local:/data

  postgres:
    image: postgres:16
    container_name: mask-pass-postgres-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mask_pass_db
    volumes:
      - ./postgres_data_local:/var/lib/postgresql/data
